appId: com.xiaoyuandev.ai-relay-box
productName: AI Relay Box
protocols:
  - name: AI Relay Box Import
    schemes:
      - ai-relay-box
afterAllArtifactBuild: scripts/cleanup-mac-artifacts.cjs
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.env,.env.*,README.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
extraResources:
  - from: ../../core/bin
    to: core/bin
    filter:
      - "**/*"
  - from: resources/ai-mini-gateway
    to: ai-mini-gateway
    filter:
      - "**/*"
asarUnpack:
  - resources/**
mac:
  target:
    - dmg
    - pkg
    - zip
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  extendInfo:
    NSDocumentsFolderUsageDescription: AI Relay Box may access files in Documents for local tooling workflows.
    NSDownloadsFolderUsageDescription: AI Relay Box may access files in Downloads for local tooling workflows.
win:
  target:
    - nsis
linux:
  target:
    - AppImage
    - tar.gz
  category: Utility
dmg:
  artifactName: AI-Relay-Box-${version}-${arch}.${ext}
pkg:
  artifactName: AI-Relay-Box-${version}-${arch}.${ext}
nsis:
  artifactName: AI-Relay-Box-${version}-${arch}-setup.${ext}
appImage:
  artifactName: AI-Relay-Box-${version}-${arch}.${ext}
artifactName: AI-Relay-Box-${version}-${os}-${arch}.${ext}
publish:
  provider: github
  owner: xiaoyuandev
  repo: ai-relay-box
  releaseType: release
npmRebuild: false
