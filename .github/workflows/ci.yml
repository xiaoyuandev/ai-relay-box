name: CI

env:
  PNPM_VERSION: 10.32.1

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Show pnpm version
        run: pnpm --version

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web UI
        run: pnpm --filter web build

      - name: Run core tests
        working-directory: core
        run: go test ./internal/api/... ./internal/localgateway/...

      - name: Typecheck desktop
        run: pnpm --filter desktop typecheck

      - name: Build desktop app
        run: pnpm build

      - name: Build server core binary
        env:
          CORE_GOOS: linux
          CORE_GOARCH: amd64
        run: pnpm --filter desktop build:core

      - name: Prepare ai-mini-gateway runtime
        env:
          AI_MINI_GATEWAY_GOOS: linux
          AI_MINI_GATEWAY_GOARCH: amd64
        run: pnpm --filter desktop prepare:ai-mini-gateway-runtime

      - name: Package server release
        env:
          RELEASE_VERSION: v0.1.0
          RELEASE_GOOS: linux
          RELEASE_GOARCH: amd64
        run: pnpm server:package
